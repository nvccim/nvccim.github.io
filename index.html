      body {

        overflow-x: hidden;
      }
      :root {
        --page-padding: 80px;
      }

      #root,
      #root * {
        box-sizing: border-box;
      }

      #root img {
        max-width: 100%;
        height: auto;

      section,

      @media (max-width: 1024px) {
        :root {

      @media (max-width: 768px) {

        }

        }

          display: flex !important;
          gap: 14px !important;
          overflow-x: auto;
          scrollbar-width: none;
          -ms-overflow-style: none;
        }

        [style*="position: fixed"][style*="height: 64px"] [style*="list-style: none"][style*="gap: 32px"]::-webkit-scrollbar {
          display: none;
        }

        [style*="position: fixed"][style*="height: 64px"] [style*="list-style: none"][style*="gap: 32px"] li {
          flex: 0 0 auto;
          font-size: 11px !important;
        }

          gap: 24px !important;

          grid-template-columns: 1fr !important;

          flex-direction: column !important;
          align-items: flex-start !important;
          gap: 16px !important;
        }
        
        [style*="position: fixed"][style*="height: 64px"][style*="justify-content: space-between"] {
          flex-direction: row !important;
          align-items: center !important;
        }

        [style*="display: flex"][style*="gap: 16px"][style*="margin-bottom: 32px"] {
          flex-wrap: wrap !important;
          row-gap: 8px !important;
        }

        [style*="repeat(3, 1fr)"] {
          grid-template-columns: 1fr !important;
        }

        [style*="padding: 36px 40px"] {

        [style*="padding: 28px 32px"] {
          padding: 20px !important;

        }

        }
